<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>虛擬薩克斯風 - 專業雙手聯動版 (修正版)</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/combine/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>

    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; text-align: center; background: #222; color: white; margin: 0; padding: 20px; }
        h1 { font-weight: 300; letter-spacing: 3px; margin-bottom: 20px; }
        .container { position: relative; width: 640px; margin: auto; }
        #webcam { transform: rotateY(180deg); width: 640px; height: 480px; display: none; }
        #output_canvas { 
            transform: rotateY(180deg); 
            width: 640px; height: 480px; 
            border: 2px solid #555; border-radius: 12px; 
            background: #000; display: block;
        }
        .info { font-size: 24px; margin-top: 15px; }
        .status-box { 
            display: flex; justify-content: space-around; 
            padding: 12px; background: #333; border-radius: 8px; 
            margin-top: 10px; width: 640px; margin-left: auto; margin-right: auto;
        }
        .active { color: #00ff00; font-weight: bold; }
        .inactive { color: #ff4444; }
        .vibrato-active { color: #ffd700; text-shadow: 0 0 12px #ffd700; font-weight: bold; }

        #loading-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(30, 30, 30, 0.98); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; 
        }
        .btn-start { 
            padding: 12px 45px; font-size: 18px; cursor: pointer; 
            background: #444; border: 1px solid #d4af37; border-radius: 4px; 
            color: #fff; transition: 0.3s;
        }
        .btn-start:hover { background: #d4af37; color: #111; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <h2 style="font-weight: 200;">🎷 Virtual Saxophone Emotional System</h2>
        <p id="status-text">音色資源載入中...</p>
        <button class="btn-start" id="start-btn" style="display:none;">開始演奏 (Start)</button>
    </div>

    <h1>Virtual Saxophone</h1>
    
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="info">
        <div id="note_display">當前音符: -</div>
        <div class="status-box">
            <div id="mouth_status">嘴巴: 等待</div>
            <div id="vibrato_status">左手晃動(抖音): 0%</div>
            <div id="inst_status">音色: Alto Sax</div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const noteDisplay = document.getElementById('note_display');
        const mouthStatusDisplay = document.getElementById('mouth_status');
        const vibratoStatusDisplay = document.getElementById('vibrato_status');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('loading-overlay');

        canvasElement.width = 640;
        canvasElement.height = 480;

        let audioCtx = null;
        let saxPlayer = null;
        let currentAudioNode = null;
        
        // --- 抖音控制變數 ---
        let lastVibHandPos = { x: 0.5, y: 0.5 }; // 追蹤畫面左側的手
        let vibratoAmount = 0; 
        const VIBRATO_THRESHOLD = 0.006; 

        function midiToNoteName(midi) {
            if (!midi) return "-";
            const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
            const octave = Math.floor(midi / 12) - 1;
            return notes[midi % 12] + octave;
        }

        async function initSound() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            try {
                saxPlayer = await Soundfont.instrument(audioCtx, 'alto_sax', { soundfont: 'MusicianStrings' });
                document.getElementById('status-text').innerText = "系統已就緒";
                startBtn.style.display = "block";
            } catch (e) {
                document.getElementById('status-text').innerText = "載入失敗";
            }
        }

        function playNote(midi) {
            if (!saxPlayer) return;
            if (currentAudioNode) currentAudioNode.stop();
            currentAudioNode = saxPlayer.play(midi, audioCtx.currentTime, { gain: 1.2 });
        }

        function stopNote() {
            if (currentAudioNode) { currentAudioNode.stop(); currentAudioNode = null; }
        }

        let currentNote = null;
        let isMouthOpen = true;
        const MOUTH_OPEN_THRESH = 0.025;
        const DIST_PRESS_THRESH = 0.08;

        let handResults = null;
        let faceResults = null;

        function updateLogic() {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);

            let L = { idx: false, mid: false, rng: false, pnk: false, thumb: false };
            let R = { idx: false, mid: false, rng: false, pnk: false };

            if (handResults && handResults.multiHandLandmarks) {
                for (let i = 0; i < handResults.multiHandLandmarks.length; i++) {
                    const landmarks = handResults.multiHandLandmarks[i];
                    const label = handResults.multiHandedness[i].label; 
                    const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FFCC', lineWidth: 2});

                    // --- 畫面左側的手 (Label: Right) -> 抖音偵測 + 右手指法 ---
                    if (label === 'Right') { 
                        L.idx = dist(landmarks[8], landmarks[5]) < DIST_PRESS_THRESH;
                        L.mid = dist(landmarks[12], landmarks[9]) < DIST_PRESS_THRESH;
                        L.rng = dist(landmarks[16], landmarks[13]) < DIST_PRESS_THRESH;
                        L.pnk = dist(landmarks[20], landmarks[17]) < DIST_PRESS_THRESH;
                        L.thumb = dist(landmarks[4], landmarks[2]) < DIST_PRESS_THRESH;

                        // 抖動偵測邏輯
                        const currentPos = landmarks[0]; 
                        const movement = Math.hypot(currentPos.x - lastVibHandPos.x, currentPos.y - lastVibHandPos.y);
                        if (movement > VIBRATO_THRESHOLD) {
                            vibratoAmount = Math.min(vibratoAmount * 0.7 + movement * 8, 1.0);
                        } else {
                            vibratoAmount *= 0.88; 
                        }
                        lastVibHandPos = { x: currentPos.x, y: currentPos.y };
                    } 
                    // --- 畫面右側的手 (Label: Left) -> 左手指法 ---
                    else {
                        R.idx = dist(landmarks[8], landmarks[5]) < DIST_PRESS_THRESH;
                        R.mid = dist(landmarks[12], landmarks[9]) < DIST_PRESS_THRESH;
                        R.rng = dist(landmarks[16], landmarks[13]) < DIST_PRESS_THRESH;
                        R.pnk = dist(landmarks[20], landmarks[17]) < DIST_PRESS_THRESH;
                    }
                }
            }

            // 嘴部偵測
            let newIsMouthOpen = true;
            if (faceResults && faceResults.multiFaceLandmarks?.[0]) {
                const fm = faceResults.multiFaceLandmarks[0];
                newIsMouthOpen = Math.abs(fm[13].y - fm[14].y) > MOUTH_OPEN_THRESH;
                canvasCtx.fillStyle = "#ff4444";
                canvasCtx.beginPath();
                canvasCtx.arc(fm[13].x * 640, fm[13].y * 480, 3, 0, 7);
                canvasCtx.arc(fm[14].x * 640, fm[14].y * 480, 3, 0, 7);
                canvasCtx.fill();
            }

            // 指法計算
            let nextNote = null;
            if (L.idx && L.mid && L.rng) {
                if (L.pnk) nextNote = 68;
                else if (R.idx && !R.mid && !R.rng && !R.pnk) nextNote = 65;
                else if (R.mid && !R.idx && !R.rng && !R.pnk) nextNote = 66;
                else if (R.idx && R.mid && !R.rng && !R.pnk) nextNote = 64;
                else if (R.idx && R.mid && R.rng && !R.pnk) nextNote = 62;
                else if (R.idx && R.mid && R.rng && R.pnk) nextNote = 60;
                else nextNote = 67;
            } else if (L.idx && !L.mid && !L.rng && !L.pnk) nextNote = 71;
            else if (L.idx && L.mid && !L.rng && !L.pnk) nextNote = 69;
            else if (L.mid && !L.idx && !L.rng && !L.pnk) nextNote = 72;
            else if (L.idx && L.mid && L.rng && L.pnk) nextNote = 68;
            if (nextNote && L.thumb) nextNote += 12;

            // 音效與抖音 LFO
            if ((nextNote !== currentNote) || (newIsMouthOpen !== isMouthOpen)) {
                if (nextNote && !newIsMouthOpen) playNote(nextNote);
                else stopNote();
            }

            if (currentAudioNode && !newIsMouthOpen) {
                const speed = 0.015;
                const wave = Math.sin(Date.now() * speed) * (vibratoAmount * 0.45);
                currentAudioNode.gain.setTargetAtTime(1.2 + wave, audioCtx.currentTime, 0.05);
            }

            currentNote = nextNote;
            isMouthOpen = newIsMouthOpen;
            
            noteDisplay.innerText = `音符: ${midiToNoteName(currentNote)}`;
            mouthStatusDisplay.innerText = isMouthOpen ? "嘴巴狀態: OPEN (停止)" : "嘴巴狀態: CLOSED (吹奏)";
            mouthStatusDisplay.className = isMouthOpen ? "inactive" : "active";
            vibratoStatusDisplay.innerText = `抖音晃動: ${Math.round(vibratoAmount * 100)}%`;
            vibratoStatusDisplay.className = vibratoAmount > 0.15 ? "vibrato-active" : "";

            canvasCtx.restore();
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        hands.onResults(res => { handResults = res; updateLogic(); });

        const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
        faceMesh.onResults(res => { faceResults = res; });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); await faceMesh.send({image: videoElement}); },
            width: 640, height: 480
        });

        startBtn.onclick = () => { audioCtx.resume(); overlay.style.display = 'none'; camera.start(); };
        initSound();
    </script>
</body>
</html><!-- v0.2 -->
