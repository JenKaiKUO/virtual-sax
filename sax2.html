<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 虛擬薩克斯風 - Soundfont 真實音色版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    
    <script src="https://cdn.jsdelivr.net/combine/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #1a1a1a; color: #eee; }
        .container { position: relative; width: 640px; margin: 20px auto; }
        #webcam { transform: rotateY(180deg); display: none; }
        #output_canvas { transform: rotateY(180deg); width: 640px; height: 480px; border: 3px solid #444; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .info { font-size: 22px; margin-top: 15px; }
        .status-box { display: flex; justify-content: center; gap: 30px; padding: 15px; background: #2a2a2a; border-radius: 10px; margin: 10px auto; width: fit-content; }
        .active { color: #00ffcc; text-shadow: 0 0 8px #00ffcc; font-weight: bold; }
        .inactive { color: #888; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .btn-start { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #00ffcc; border: none; border-radius: 5px; color: #111; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <h2>🎷 正在準備音色庫與 AI 模型...</h2>
        <p id="status-text">請稍候</p>
        <button class="btn-start" id="start-btn" style="display:none;">開始演奏</button>
    </div>

    <h1>🎷 AI Virtual Saxophone (HQ Sound)</h1>
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="info">
        <div id="note_display">當前音符: -</div>
        <div class="status-box">
            <div id="mouth_status">嘴巴狀態: 讀取中</div>
            <div id="inst_status">音色: Alto Sax</div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status-text');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('loading-overlay');

        let audioCtx = null;
        let saxPlayer = null;
        let currentAudioNode = null; // 用於停止當前正在播放的音訊節點

        // --- 初始化音訊與音色 ---
        async function initSoundfont() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            statusText.innerText = "正在下載薩克斯風採樣音色...";
            
            try {
                // 從 GitHub 上的音色庫載入 alto_sax
                saxPlayer = await Soundfont.instrument(audioCtx, 'alto_sax', {
                    soundfont: 'MusicianStrings' // 使用更高品質的音色庫源
                });
                statusText.innerText = "準備就緒！";
                startBtn.style.display = "block";
            } catch (e) {
                statusText.innerText = "音色加載失敗，請重新整理網頁。";
            }
        }

        function playNote(midi) {
            if (!saxPlayer || !audioCtx) return;
            // 如果正在吹同一個音，就不重複觸發
            if (currentAudioNode) currentAudioNode.stop();
            // 播放音符
            currentAudioNode = saxPlayer.play(midi, audioCtx.currentTime, { gain: 1.5 });
        }

        function stopNote() {
            if (currentAudioNode) {
                currentAudioNode.stop();
                currentAudioNode = null;
            }
        }

        // --- 指法邏輯變數 ---
        let currentMidi = null;
        let isMouthOpen = true;
        const MOUTH_OPEN_THRESH = 0.025;
        const DIST_PRESS_THRESH = 0.08;

        function getDistance(pt1, pt2) {
            return Math.hypot(pt1.x - pt2.x, pt1.y - pt2.y);
        }

        let handResults = null;
        let faceResults = null;

        function onHandResults(results) { handResults = results; updateLogic(); }
        function onFaceResults(results) { faceResults = results; }

        function updateLogic() {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);

            let L = { idx: false, mid: false, rng: false, pnk: false, thumb: false };
            let R = { idx: false, mid: false, rng: false, pnk: false };

            if (handResults && handResults.multiHandLandmarks) {
                for (let i = 0; i < handResults.multiHandLandmarks.length; i++) {
                    const landmarks = handResults.multiHandLandmarks[i];
                    const label = handResults.multiHandedness[i].label; 
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FFCC', lineWidth: 2});

                    // 修正鏡像：'Right' 標籤對應畫面的左手
                    if (label === 'Right') { 
                        L.idx = getDistance(landmarks[8], landmarks[5]) < DIST_PRESS_THRESH;
                        L.mid = getDistance(landmarks[12], landmarks[9]) < DIST_PRESS_THRESH;
                        L.rng = getDistance(landmarks[16], landmarks[13]) < DIST_PRESS_THRESH;
                        L.pnk = getDistance(landmarks[20], landmarks[17]) < DIST_PRESS_THRESH;
                        L.thumb = getDistance(landmarks[4], landmarks[2]) < DIST_PRESS_THRESH;
                    } else {
                        R.idx = getDistance(landmarks[8], landmarks[5]) < DIST_PRESS_THRESH;
                        R.mid = getDistance(landmarks[12], landmarks[9]) < DIST_PRESS_THRESH;
                        R.rng = getDistance(landmarks[16], landmarks[13]) < DIST_PRESS_THRESH;
                        R.pnk = getDistance(landmarks[20], landmarks[17]) < DIST_PRESS_THRESH;
                    }
                }
            }

            let newIsMouthOpen = true;
            if (faceResults && faceResults.multiFaceLandmarks && faceResults.multiFaceLandmarks.length > 0) {
                const fm = faceResults.multiFaceLandmarks[0];
                const mouthDist = Math.abs(fm[13].y - fm[14].y);
                newIsMouthOpen = mouthDist > MOUTH_OPEN_THRESH;
                
                canvasCtx.fillStyle = "#FF00FF";
                canvasCtx.beginPath();
                canvasCtx.arc(fm[13].x * canvasElement.width, fm[13].y * canvasElement.height, 3, 0, 2*Math.PI);
                canvasCtx.arc(fm[14].x * canvasElement.width, fm[14].y * canvasElement.height, 3, 0, 2*Math.PI);
                canvasCtx.fill();
            }

            // 薩克斯風指法對照
            let nextMidi = null;
            if (L.idx && L.mid && L.rng) {
                if (L.pnk) nextMidi = 68;
                else if (R.idx && !R.mid && !R.rng && !R.pnk) nextMidi = 65;
                else if (R.mid && !R.idx && !R.rng && !R.pnk) nextMidi = 66;
                else if (R.idx && R.mid && !R.rng && !R.pnk) nextMidi = 64;
                else if (R.idx && R.mid && R.rng && !R.pnk) nextMidi = 62;
                else if (R.idx && R.mid && R.rng && R.pnk) nextMidi = 60;
                else nextMidi = 67;
            } else if (L.idx && !L.mid && !L.rng && !L.pnk) nextMidi = 71;
            else if (L.idx && L.mid && !L.rng && !L.pnk) nextMidi = 69;
            else if (L.mid && !L.idx && !L.rng && !L.pnk) nextMidi = 72;
            else if (L.idx && L.mid && L.rng && L.pnk) nextMidi = 68;

            if (nextMidi && L.thumb) nextMidi += 12;

            // --- 核心吹奏邏輯 ---
            const noteChanged = (nextMidi !== currentMidi);
            const mouthChanged = (newIsMouthOpen !== isMouthOpen);

            if (noteChanged || mouthChanged) {
                if (nextMidi && !newIsMouthOpen) {
                    // 只要換音符或者是剛開始吹氣，就發聲
                    if (noteChanged || (mouthChanged && isMouthOpen)) {
                        playNote(nextMidi);
                    }
                } else {
                    stopNote();
                }
            }

            currentMidi = nextMidi;
            isMouthOpen = newIsMouthOpen;
            
            // UI 更新
            document.getElementById('note_display').innerText = nextMidi ? `當前音符 MIDI: ${nextMidi}` : "當前音符: -";
            document.getElementById('mouth_status').innerText = isMouthOpen ? "嘴巴狀態: OPEN (停止)" : "嘴巴狀態: CLOSED (吹奏)";
            document.getElementById('mouth_status').className = isMouthOpen ? "inactive" : "active";

            canvasCtx.restore();
        }

        // --- 初始化 MediaPipe ---
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        hands.onResults(onHandResults);

        const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        faceMesh.onResults(onFaceResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
                await faceMesh.send({ image: videoElement });
            },
            width: 640, height: 480
        });

        // --- 開始按鈕點擊 ---
        startBtn.onclick = () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            overlay.style.display = 'none';
            camera.start();
        };

        initSoundfont();
    </script>
</body>
</html><!-- v0.2 -->
